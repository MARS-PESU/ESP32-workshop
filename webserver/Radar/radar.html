<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    background: black;
    color: #00ff00;
  }
  h1 { font-size: 40px; }
  p { font-size: 25px; }
  canvas {
    background: black;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h1>ESP32 Radar (Laptop View)</h1>
<p>Distance: <span id="_CM">0</span> cm</p>
<p>Angle: <span id="_ANGLE">0</span>°</p>

<canvas id="radar" width="800" height="500"></canvas>

<script>
// 🔴 CHANGE THIS TO YOUR ESP32 IP
const ESP_IP = "http://10.68.64.16";

let angle = 0;
let distance = 0;

// ================= FETCH DATA =================
setInterval(() => {
  fetch(ESP_IP + "/readDistance")
    .then(res => res.json())
    .then(data => {
      distance = parseInt(data[0]);
      angle = parseInt(data[1]);

      document.getElementById("_CM").innerText = distance;
      document.getElementById("_ANGLE").innerText = angle;
    })
    .catch(err => console.log("ESP32 not reachable"));
}, 50);

// ================= CANVAS =================
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function drawRadar() {
  // fade effect
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height;

  ctx.strokeStyle = "#00ff00";
  ctx.lineWidth = 2;

  // radar arcs
  for (let r = 100; r <= 300; r += 100) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
    ctx.stroke();
  }

  // angle line
  let rad = angle * Math.PI / 180;
  let x = cx + 300 * Math.cos(rad);
  let y = cy - 300 * Math.sin(rad);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.stroke();

  // object detection
  if (distance < 40) {
    let d = distance * 5;
    let ox = cx + d * Math.cos(rad);
    let oy = cy - d * Math.sin(rad);

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(ox, oy, 5, 0, 2 * Math.PI);
    ctx.fill();
  }
}

// redraw loop
setInterval(drawRadar, 50);
</script>

</body>
</html>
